<section id="search">
    <div class="navbar navbar-expand-lg">
        <div class="navbar-brand">
            <img src="/assets/pict/soulsHeroesLogo.png" [routerLink]="'/univers'" class="img-fluid w-100" alt="siteLogo" />
        </div>
        <button type="button" id="btnBar" data-bs-toggle="modal" data-bs-target="#sideCanvas"><i class="fas fa-bars"></i></button>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a [routerLink]="'/heroes'" class="nav-link">HEROS</a></li>
                <li class="nav-item"><a [routerLink]="'/search'" class="nav-link">RECHERCHE</a></li>
            </ul>
            <button type="button" id="btnConnect" [routerLink]="'/login'">SE CONNECTER</button>
        </div>
    </div>

    <div class="containSearch">
        <div class="showSearch">
            <form [formGroup]="searchComicsList" (submit)="searchComics()">
                <label></label>
                <input type="text" name="title" id="title" placeholder="Entrer un titre" formControlName="title" class="form-control" required>
            
                <button type="submit" id="btnSearch"><i class="fa fa-search"></i></button>
            </form>

            <div class="results" *ngIf="searchedTitle">
                <h3 class="searchResult">Résultats de recherche pour : {{ searchedTitle }}</h3>
            </div>

            <div class="results" *ngIf="results && !loading">
                <div class="resultsSearch">
                    <div class="row">
                        <div class="col-lg-4" *ngFor="let result of results">
                            <img [src]="result.book" class="img-fluid w-100" />
                            <p>{{result.title}}</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="noFound" *ngIf="results.length === 0">
                <p>Aucun résultat trouvé</p>
            </div>

            <div class="load" *ngIf="loading">
                <p>Chargemant en cours...</p>
            </div>

            <div class="errorMessage" *ngIf="errorMessage">
                <p>{{ errorMessage }}</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="copy">© SOUL'S HEROES 2023</div>
        <button type="button" id="btnContact" data-bs-toggle="modal" data-bs-target="#contact"><i class="fa-solid fa-message"></i></button>
    </div>
</section>

<div class="modal fade" id="contact" aria-hidden="true" tabindex="-1">
    <button type="button" id="btnCloseModal" data-bs-dismiss="modal"><i class="fas fa-times"></i></button>
    <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">        
        <div class="modal-body">
            <h2>CONTACTEZ-NOUS :</h2>
            <div class="form-area">
                <form [formGroup]="answer" (ngSubmit)="sendMessage()">
                    <div class="formGroupOne">
                        <div class="form-group">
                            <label></label>
                            <input type="text" name="user"class="form-control" placeholder="Nom d'utilsateur" formControlName="pseudo" required />
                        </div>
                        <div class="form-group">
                            <label></label>
                            <input type="text" name="subject" class="form-control" placeholder="Sujet" formControlName="subject" required />
                        </div>
                    </div>  
                    <div class="form-group">
                        <label></label>
                        <textarea name="message" placeholder="Message" class="form-control" minlength="300" cols="30" rows="10" formControlName="message" required></textarea>
                    </div>
                    <button type="submit" id="btnSend">ENVOYER</button>
                </form>
            </div>
        </div>
    </div>
  </div>
</div>
